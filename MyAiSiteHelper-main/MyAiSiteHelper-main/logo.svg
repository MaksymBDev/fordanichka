<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 52 52" width="52" height="52">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8c87a"/>
      <stop offset="100%" style="stop-color:#d4956a"/>
    </linearGradient>
    <linearGradient id="sun" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fff8e7;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#fde68a;stop-opacity:1"/>
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect width="52" height="52" rx="14" fill="url(#bg)"/>
  <!-- Sun rays -->
  <g stroke="#fff8e7" stroke-width="2" stroke-linecap="round" opacity="0.7">
    <!-- top -->
    <line x1="26" y1="8" x2="26" y2="12"/>
    <!-- top-right -->
    <line x1="34.5" y1="10.5" x2="32" y2="13"/>
    <!-- right -->
    <line x1="38" y1="19" x2="34.5" y2="20.5"/>
    <!-- bottom-right -->
    <line x1="36" y1="27" x2="33" y2="27"/>
    <!-- bottom -->
    <line x1="30" y1="33" x2="29" y2="30.5"/>
    <!-- bottom-left -->
    <line x1="21.5" y1="33" x2="23" y2="30.5"/>
    <!-- left -->
    <line x1="14" y1="27" x2="17.5" y2="27"/>
    <!-- top-left -->
    <line x1="17.5" y1="10.5" x2="20" y2="13"/>
  </g>
  <!-- Sun circle -->
  <circle cx="26" cy="22" r="8" fill="url(#sun)" opacity="0.95"/>
  <!-- Small leaf/sprout at bottom -->
  <path d="M22 38 Q26 32 30 38" stroke="#fff8e7" stroke-width="1.8" fill="none" stroke-linecap="round" opacity="0.8"/>
  <line x1="26" y1="35" x2="26" y2="43" stroke="#fff8e7" stroke-width="1.8" stroke-linecap="round" opacity="0.8"/>
  <!-- Horizon line -->
  <line x1="16" y1="35" x2="36" y2="35" stroke="#fff8e7" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
</svg>
